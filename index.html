<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFAITH | Who is Jesus? (A1)</title>
    
    <!-- Tipografia de Elite -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- WOLF FAITH ENGINE V88: DIVINE EDITION (GOLD & BLACK) --- */
        :root {
            --bg: #000000;
            --surface: rgba(15, 15, 15, 0.85);
            --surface-hover: rgba(212, 175, 55, 0.1);
            --border: rgba(212, 175, 55, 0.3);
            --accent: #D4AF37; /* Royal Gold */
            --accent-dim: rgba(212, 175, 55, 0.15);
            --accent-glow: rgba(212, 175, 55, 0.4);
            --correct: #1DB954;
            --incorrect: #E50914; 
            --text-main: #FFFFFF;
            --text-dim: #A1A1AA;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
            --font-code: 'Fira Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-body); }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- ATMOSFERA DIVINA --- */
        .ambient-light {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.15;
            animation: floatOrb 25s infinite alternate ease-in-out;
        }
        .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #fff; bottom: -10%; right: -10%; opacity: 0.05; }

        @keyframes floatOrb { 0% { transform: translate(0,0); } 100% { transform: translate(60px, 60px); } }

        /* --- CABEÇALHO --- */
        .header {
            position: fixed; top: 0; left: 0; right: 0; height: 80px; padding: 0 40px;
            display: flex; align-items: center; justify-content: space-between; z-index: 100;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-family: var(--font-display); font-weight: 900; font-size: 1.2rem; letter-spacing: 3px; color: #fff; }
        .logo span { color: var(--accent); }

        .progress-container { position: absolute; bottom: -1px; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.05); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent-glow); }

        /* --- CONTROLES (FULLSCREEN & WHITEBOARD) --- */
        .controls { display: flex; gap: 15px; }
        .icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); width: 45px; height: 45px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; backdrop-filter: blur(10px); font-size: 1.2rem;}
        .icon-btn:hover { background: var(--accent); color: #000; transform: translateY(-2px); }

        /* --- CONTEÚDO --- */
        main { flex: 1; margin-top: 80px; margin-bottom: 100px; position: relative; display: flex; align-items: center; justify-content: center; z-index: 10; padding: 20px; }

        .step {
            position: absolute; width: 100%; max-width: 1050px; opacity: 0; pointer-events: none;
            transform: translateY(20px); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            visibility: hidden; max-height: 80vh; overflow-y: auto; padding: 20px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .step.active { opacity: 1; pointer-events: auto; transform: translateY(0); visibility: visible; position: relative; }

        /* --- GLASS CARDS & PANELS --- */
        .glass-panel {
            background: var(--surface); backdrop-filter: blur(40px); border: 1px solid var(--border);
            border-top: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
            text-align: center; width: 100%;
        }
        
        .dual-panel { display: flex; gap: 40px; align-items: center; width: 100%; text-align: left; }
        .dual-panel > * { flex: 1; }
        @media (max-width: 850px) { .dual-panel { flex-direction: column; text-align: center; } }

        /* --- TIPOGRAFIA --- */
        h1 { font-family: var(--font-display); font-size: 4.5rem; line-height: 1.1; margin-bottom: 20px; color: #fff; text-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        h2 { font-family: var(--font-display); font-size: 2.2rem; color: var(--accent); margin-bottom: 20px; }
        .tag { font-family: var(--font-code); color: var(--accent); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; display: inline-block; background: rgba(212, 175, 55, 0.1); padding: 6px 16px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.2);}
        p { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 25px; line-height: 1.7;}

        /* --- BIBLE VERSE INTERACTION --- */
        .verse-box { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; padding: 40px; margin-bottom: 30px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);}
        .verse-text { font-family: var(--font-display); font-size: 2.8rem; line-height: 1.6; color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .verse-word { 
            color: var(--accent); cursor: pointer; border-bottom: 3px dashed var(--accent); 
            transition: 0.3s; position: relative; display: inline-block; padding: 0 5px;
            animation: pulseGlow 2s infinite alternate; font-weight: 900;
        }
        .verse-word:hover, .verse-word.active { 
            color: #fff; border-bottom-style: solid; background: rgba(212, 175, 55, 0.2); 
            border-radius: 6px; animation: none; text-shadow: 0 0 20px var(--accent-glow);
        }
        @keyframes pulseGlow { 0% { text-shadow: 0 0 5px var(--accent-glow); } 100% { text-shadow: 0 0 20px var(--accent); } }
        
        .verse-analysis-panel {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--accent); border-radius: 16px;
            padding: 30px; display: none; align-items: center; gap: 25px; text-align: left;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .verse-analysis-panel.show { display: flex; }
        .verse-analysis-icon { font-size: 3.5rem; color: var(--accent); filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); width: 80px; text-align: center;}
        .verse-analysis-text h3 { font-family: var(--font-display); color: #fff; font-size: 2rem; margin-bottom: 5px; line-height: 1;}
        .verse-analysis-text p { color: var(--text-dim); font-size: 1.1rem; margin: 0; font-family: var(--font-body); font-weight: 600;}
        .verse-analysis-text .pt-translation { font-family: var(--font-code); color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block;}

        /* --- INTERACTIVIDADE --- */
        .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border); transition: 0.3s; color: #fff; position: relative;}
        .choice-card:hover { border-color: #fff; background: rgba(255,255,255,0.05); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);}
        .choice-card i { font-size: 2.8rem; color: var(--accent); margin-bottom: 15px; transition: 0.3s; }
        .choice-card:hover i { transform: scale(1.1); }
        .choice-card.correct { border-color: var(--correct); background: rgba(29, 185, 84, 0.1); }
        .choice-card.wrong { border-color: var(--incorrect); animation: shake 0.4s; }

        .mc-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff;
            padding: 18px 25px; border-radius: 14px; font-size: 1.15rem; font-weight: 600;
            text-align: left; transition: all 0.3s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 12px;
        }
        .mc-btn:hover { background: var(--surface-hover); border-color: var(--accent); transform: translateX(8px); }
        .mc-btn.correct { border-color: var(--correct); background: rgba(29, 185, 84, 0.15); color: var(--correct); font-weight: 800; box-shadow: 0 0 20px rgba(29, 185, 84, 0.2); pointer-events: none;}
        .mc-btn.correct::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; }
        .mc-btn.incorrect { border-color: var(--incorrect); background: rgba(229, 9, 20, 0.1); color: #fff; pointer-events: none; animation: shake 0.4s;}
        .mc-btn.incorrect::after { content: '\f00d'; font-family: 'Font Awesome 6 Free'; font-weight: 900; }

        /* Flip Logic */
        .discovery-card { perspective: 1000px; height: 220px; cursor: pointer; }
        .discovery-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .discovery-card.flipped .discovery-card-inner { transform: rotateY(180deg); }
        .discovery-front, .discovery-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--border); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);}
        .discovery-front { background: rgba(255,255,255,0.03); }
        .discovery-front i { font-size: 3rem; color: var(--accent); margin-bottom: 15px;}
        .discovery-front h3 { font-family: var(--font-body); font-size: 1.3rem; color: #fff;}
        .discovery-back { background: var(--accent); color: #000; transform: rotateY(180deg); font-weight: 700; text-align: center; }

        /* Sentence Builder */
        .drop-zone { min-height: 120px; border: 2px dashed var(--border); border-radius: 16px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; padding: 20px; gap: 12px; flex-wrap: wrap; background: rgba(0,0,0,0.3); transition: 0.3s; }
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.1); box-shadow: inset 0 0 30px rgba(29,185,84,0.15);}
        .word-bank { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .word-chip { padding: 14px 28px; background: var(--surface); color: #fff; border: 1px solid var(--border); border-radius: 500px; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .word-chip:hover { transform: translateY(-3px); border-color: var(--accent); background: rgba(212, 175, 55, 0.1); color: var(--accent);}
        .word-chip.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* Chat Scenario */
        .chat-container { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-top: 10px;}
        .msg { padding: 18px 25px; border-radius: 16px; max-width: 85%; font-size: 1.1rem; line-height: 1.5; text-align: left; border: 1px solid rgba(255,255,255,0.05);}
        .msg.friend { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; color: #fff; }
        .msg.you { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 800; box-shadow: 0 5px 20px var(--accent-glow); animation: slideUp 0.3s;}

        /* Error Finder */
        .highlight-zone { padding: 40px 30px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);}
        .error-sentence { font-size: 1.8rem; word-spacing: 6px; line-height: 1.8; font-weight: 700; color: #fff; font-family: var(--font-academic);}
        .error-word { display: inline-block; padding: 6px 12px; cursor: pointer; border-radius: 10px; transition: 0.3s; border: 1px solid transparent;}
        .error-word:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: scale(1.05); color: var(--accent);}

        /* Video */
        .video-wrapper { position: relative; aspect-ratio: 16/9; width: 100%; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.8); margin-bottom: 30px;}
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Speaking Hub */
        .speaking-hub {
            margin-top: 30px; padding: 35px; background: rgba(212, 175, 55, 0.05);
            border: 1px solid var(--accent-glow); border-radius: 20px; position: relative; text-align: left;
        }
        .speaking-hub::before {
            content: '🎙️ SPEAKING HUB'; position: absolute; top: -14px; left: 30px;
            background: var(--accent); color: #000; font-family: var(--font-body); font-size: 0.75rem;
            font-weight: 900; padding: 6px 16px; border-radius: 500px; letter-spacing: 1px; box-shadow: 0 0 15px var(--accent-glow);
        }
        .speaking-hub p { color: #fff; font-weight: 600; font-size: 1.25rem; margin-bottom: 15px; }
        .starter-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff;
            padding: 10px 20px; border-radius: 500px; cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 1rem; margin: 4px; display: inline-block;
        }
        .starter-btn:hover, .starter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); transform: translateY(-2px);}

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 100px; padding: 0 50px;
            background: rgba(0,0,0,0.95); border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; z-index: 100; backdrop-filter: blur(20px);
        }
        .btn { padding: 18px 45px; border-radius: 500px; border: none; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 1.05rem; }
        .btn-accent { background: var(--accent); color: #000; box-shadow: 0 10px 30px var(--accent-glow);}
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn:disabled { opacity: 0.3; pointer-events: none; box-shadow: none;}

        /* Dictionary Items & Panel */
        .vocab-word { color: var(--accent); font-weight: 800; cursor: help; border-bottom: 2px dashed var(--accent); transition: 0.3s; padding: 0 2px;}
        .vocab-word:hover { background: rgba(212, 175, 55, 0.1); color: #fff; border-bottom-style: solid; text-shadow: 0 0 10px var(--accent-glow);}

        .aside-panel {
            position: fixed; top: 0; right: -500px; width: 450px; height: 100vh;
            background: rgba(10, 10, 15, 0.98); backdrop-filter: blur(40px); z-index: 200;
            padding: 70px 45px; border-left: 1px solid var(--border); transition: right 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; gap: 25px; box-shadow: -20px 0 60px rgba(0,0,0,0.9); overflow-y: auto;
        }
        .aside-panel.open { right: 0; }
        .close-aside { position: absolute; top: 30px; right: 30px; color: #fff; cursor: pointer; font-size: 1.8rem; opacity: 0.5; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;}
        .close-aside:hover { opacity: 1; transform: rotate(90deg); color: var(--incorrect); border-color: var(--incorrect);}

        /* Whiteboard */
        .whiteboard-panel { 
            position: fixed; bottom: 110px; right: 40px; width: 450px; height: 500px; 
            background: rgba(15,15,15,0.98); border: 1px solid var(--border); border-radius: 16px; 
            z-index: 101; transform: translateY(120%) scale(0.9); display: flex; flex-direction: column; 
            transition: all 0.5s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.9); 
            backdrop-filter: blur(30px); opacity: 0;
        }
        .whiteboard-panel.open { transform: translateY(0) scale(1); opacity: 1;}
        .wb-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; font-family: var(--font-display); font-size: 1rem; color: #fff; letter-spacing: 1px;}
        .wb-content { flex: 1; padding: 25px; outline: none; color: var(--accent); font-family: var(--font-code); font-size: 1.1rem; resize: none; border: none; background: transparent; line-height: 1.8;}
        .wb-content::placeholder { color: rgba(212, 175, 55, 0.3); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-8px); } 50% { transform: translateX(8px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <header class="header">
        <div class="logo">WOLF<span>FAITH</span> | DIVINE EDITION</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Teacher's Whiteboard"><i class="fa-solid fa-chalkboard"></i></button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode"><i class="fa-solid fa-expand"></i></button>
        </div>
        <div id="stepCounter" style="font-weight: 900; letter-spacing: 4px; color: var(--accent); font-size: 0.8rem; position: absolute; left: 50%; transform: translateX(-50%);">SCENE 1 / 36</div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <aside class="aside-panel" id="asidePanel">
        <i class="fa-solid fa-xmark close-aside" onclick="toggleAside()"></i>
        <div id="asideContent"></div>
    </aside>

    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header"><span><i class="fa-solid fa-chalkboard" style="color:var(--accent); margin-right: 10px;"></i> TEACHER'S BOARD</span><button style="background:transparent; border:none; color:#fff; cursor:pointer; font-size:1.2rem; opacity:0.5;" onclick="toggleWhiteboard()"><i class="fa-solid fa-xmark"></i></button></div>
        <textarea class="wb-content" placeholder="> Type grammar rules, vocabulary, or notes here..."></textarea>
    </aside>

    <main id="mainContainer"></main>

    <nav class="nav-bar">
        <button class="btn btn-outline" id="prevBtn" onclick="changeStep(-1)"><i class="fa-solid fa-arrow-left"></i> VOLTAR</button>
        <button class="btn btn-accent" id="nextBtn" onclick="changeStep(1)">PRÓXIMO <i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <script>
        // --- 1. DADOS DO DICIONÁRIO & BIBLE VERSE ---
        const dictionary = {
            'identity': { def: 'Who a person is. Their name and character.', ex: 'His identity is based on love.', follow: 'How do you describe your identity in one word?' },
            'symbol': { def: 'A sign or object that represents an idea.', ex: 'The cross is a symbol of faith.', follow: 'What is a symbol that makes you feel peaceful?' },
            'guidance': { def: 'Help or advice to show someone where to go.', ex: 'I need guidance to find my path.', follow: 'Who gives you the best guidance in your life?' },
            'honest': { def: 'Telling the truth. Not lying.', ex: 'A good friend is always honest.', follow: 'Is it hard to be honest all the time? Why?' },
            'metaphor': { def: 'A way to describe something by comparing it to something else.', ex: "Calling him 'the light' is a metaphor.", follow: 'Can you think of another metaphor for hope?' },
            'eternity': { def: 'Time without an end.', ex: 'Faith is about eternity.', follow: 'Does the idea of eternity make you feel calm or curious?' },
            'compassion': { def: 'A strong feeling of sympathy for people who are suffering.', ex: 'He showed great compassion to the poor.', follow: 'When was the last time you felt compassion for someone?' },
            'holy': { def: 'Dedicated or consecrated to God; sacred.', ex: 'The Bible is a holy book.', follow: 'What places do you consider holy?' },
            'pure': { def: 'Not mixed with any other substance or material; clean.', ex: 'His intentions were pure.', follow: 'How can someone have a pure heart?' },
            'divine': { def: 'Of, from, or like God.', ex: 'We believe in divine love.', follow: 'What is the most divine thing you have experienced?' },
            'believer': { def: 'A person who believes that a specified thing is true.', ex: 'She is a strong believer in God.', follow: 'Are you a believer? Why?' }
        };

        const verseAnalysis = {
            'am': { title: 'I Am (Verb To Be)', trans: 'Eu sou', desc: 'Jesus is speaking about Himself in the first person.', icon: 'fa-comment-dots' },
            'way': { title: 'The Way', trans: 'O Caminho', desc: 'The direction we must follow to find peace.', icon: 'fa-map-location-dot' },
            'truth': { title: 'The Truth', trans: 'A Verdade', desc: '100% honest and real. No lies.', icon: 'fa-scale-balanced' },
            'life': { title: 'The Life', trans: 'A Vida', desc: 'Spiritual energy and the promise of eternity.', icon: 'fa-heart-pulse' }
        };

        // --- 2. CONTEÚDO DAS CENAS (36 SCENES) ---
        const scenes = [
            // SCENE 0: TEACHER GUIDE (PROTOCOL)
            { 
                type: 'intro', tag: 'ADMIN ACCESS // TEACHER GUIDE', h1: 'Lesson<br>Protocol', 
                text: 'Welcome to Wolfaith A1. This Masterclass focuses on the <strong>Verb To Be</strong> through the lens of spiritual identity. Use the whiteboard for visual aids and encourage the student to use the Dictionary items.',
                hub: 'Teacher: Open the session by asking about the student\'s week and their current spiritual "vibe".',
                starters: ['My week was good...', 'I feel peaceful today...', 'I am ready to learn...']
            },
            // SCENE 1: HERO
            { 
                type: 'intro', tag: 'A1 BEGINNER // IDENTITY', h1: 'Who is<br>Jesus?', 
                text: 'Welcome to a journey of faith and language. Today, we discover the <span class="vocab-word" onclick="showVocab(\'identity\')">identity</span> of Jesus using the Verb To Be.',
                hub: 'Teacher: Ask the student who the most important person in their life is.',
                starters: ['To me, the most important person is...', 'In my opinion, my mother is...']
            },
            // SCENE 2: IMPORTANT PEOPLE WARM-UP
            {
                type: 'discovery', tag: 'WARM-UP', h1: 'Important People',
                text: 'Think about the people around you. Click the cards to see who inspires us.',
                items: [

        let currentStep = 0;
        let buildState = {};

        function renderStep() {
            const container = document.getElementById('mainContainer');
            const data = scenes[currentStep];
            if(!data) return;

            let html = '';
            const hubHTML = `
                <div class="speaking-hub">
                    <p>${data.hub || 'Pronto para discutir?'}</p>
                    <div class="speaking-starters">
                        ${data.starters ? data.starters.map(s => `<button class="starter-btn" onclick="this.classList.toggle('active')">${s}</button>`).join('') : ''}
                    </div>
                </div>`;

            if(data.type === 'intro' || data.type === 'end') {
                html = `<div class="step active"><div class="glass-panel"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><p>${data.text}</p>${hubHTML}</div></div>`;
            } else if(data.type === 'discovery') {
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><p>${data.text}</p><div class="choice-grid">${data.items.map(item => `
                    <div class="discovery-card" onclick="this.classList.toggle('flipped')">
                        <div class="discovery-card-inner">
                            <div class="discovery-front">
                                <i class="fa-solid ${item.icon}"></i>
                                <h3>${item.label}</h3>
                            </div>
                            <div class="discovery-back">
                                <p style="color:#000; margin:0; font-weight:800;">${item.text}</p>
                            </div>
                        </div>
                    </div>`).join('')}</div>${hubHTML}</div>`;
            } else if(data.type === 'video') {
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><div class="video-wrapper"><iframe src="${data.videoUrl}" frameborder="0" allowfullscreen></iframe></div>${hubHTML}</div>`;
            } else if(data.type === 'comprehension') {
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><p>${data.text}</p><div class="choice-grid">${data.choices.map(c => `<div class="choice-card" onclick="checkComp(this, ${c.correct})"><h3>${c.text}</h3></div>`).join('')}</div>${hubHTML}</div>`;
            } else if(data.type === 'builder') {
                const dzId = `dz-${currentStep}`;
                buildState[dzId] = [];
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><p>${data.text}</p><div class="drop-zone" id="${dzId}"></div><div class="word-bank">${data.chips.map(word => `<div class="word-chip" onclick="moveWord(this, '${dzId}', ${JSON.stringify(data.target).replace(/"/g, '&quot;')})">${word}</div>`).join('')}</div>${hubHTML}</div>`;
            } else if(data.type === 'error') {
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><p>${data.text}</p><div class="glass-panel"><div class="error-sentence">${data.sentence.map((word, wIdx) => `<span class="error-word" onclick="checkError(this, ${wIdx === data.correctIdx})">${word}</span>`).join(' ')}</div></div>${hubHTML}</div>`;
            } else if(data.type === 'arena') {
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><p>${data.text}</p><div class="arena-grid">${data.cards.map(c => `<div class="arena-card" onclick="this.classList.toggle('flipped')"><div class="card-inner"><div class="card-front">${c.front}</div><div class="card-back">${c.back}</div></div></div>`).join('')}</div>${hubHTML}</div>`;
            } else if (data.type === 'dual') {
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><div class="dual-panel">${data.left}${data.right}</div>${hubHTML}</div>`;
            } else if (data.type === 'chat') {
                html = `<div class="step active"><span class="tag">${data.tag}</span><h1>${data.h1}</h1><div class="glass-panel"><div class="chat-container" id="chat-${currentStep}"><div class="msg friend">${data.msg}</div><div class="mc-options" style="margin-top:20px;">${data.options.map(opt => `<button class="mc-btn" data-correct="${opt.correct}" onclick="handleChat(this, ${opt.correct}, 'chat-${currentStep}')">${opt.text}</button>`).join('')}</div></div></div>${hubHTML}</div>`;
            } else if (data.type === 'verse') {
                html = `
                <div class="step active">
                    <span class="tag">${data.tag}</span>
                    <h1>${data.h1}</h1>
                    <p>${data.text}</p>
                    <div class="verse-box">
                        <p class="verse-text">${data.verseHTML}</p>
                    </div>
                    <div class="verse-analysis-panel" id="versePanel">
                        <!-- Conteúdo injetado via JS -->
                    </div>
                    ${hubHTML}
                </div>`;
            }

            container.innerHTML = html;
            
            document.getElementById('stepCounter').innerText = `SCENE ${currentStep + 1} / ${scenes.length}`;
            document.getElementById('progressBar').style.width = `${((currentStep + 1) / scenes.length) * 100}%`;
            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').innerText = currentStep === scenes.length - 1 ? "FINISH" : "NEXT";
        }

        // --- BIBLE VERSE ENGINE ---
        function analyzeVerse(element, wordKey) {
            // Remove active style from all words
            document.querySelectorAll('.verse-word').forEach(w => w.classList.remove('active'));
            // Add active style to clicked word
            element.classList.add('active');

            const data = verseAnalysis[wordKey];
            const panel = document.getElementById('versePanel');
            
            panel.innerHTML = `
                <div class="verse-analysis-icon"><i class="fa-solid ${data.icon}"></i></div>
                <div class="verse-analysis-text">
                    <h3>${data.title}</h3>
                    <span class="pt-translation">PT: ${data.trans}</span>
                    <p>${data.desc}</p>
                </div>
            `;
            panel.classList.add('show');
        }

        // --- DICIONÁRIO ENGINE ---
        function showVocab(wordKey) {
            const data = dictionary[wordKey.toLowerCase()];
            if(!data) return;

            const aside = document.getElementById('asidePanel');
            const content = document.getElementById('asideContent');

            content.innerHTML = `
                <p class="tag" style="margin-bottom: 5px;"><i class="fa-solid fa-book"></i> A1 DICTIONARY</p>
                <h2 style="font-size: 3rem; margin-bottom: 20px; color:#fff; font-family: var(--font-display);">${wordKey.toUpperCase()}</h2>
                <div class="glass-panel" style="padding: 30px; text-align: left; margin-bottom: 25px; border-radius: 16px; border-color: var(--accent);">
                    <p style="color: var(--accent); font-weight: 900; margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 2px;">DEFINITION</p>
                    <p style="color: #fff; margin-bottom: 25px; font-size: 1.2rem; line-height: 1.6;">${data.def}</p>
                    <p style="color: var(--text-dim); font-weight: 900; margin-bottom: 10px; font-size: 0.85rem; letter-spacing: 2px;">EXAMPLE</p>
                    <p style="font-style: italic; color: var(--text-dim); font-size: 1.1rem; line-height: 1.6;">"${data.ex}"</p>
                </div>
                <div class="speaking-hub" style="margin-top: 0; background: var(--accent); border-color: var(--accent); box-shadow: 0 10px 30px var(--accent-glow);">
                    <p style="color:#000; font-weight:900; font-size:1.2rem; margin-bottom: 0;">🎙️ FOLLOW UP:</p>
                    <p style="color:#000 !important; font-weight:700; font-size:1.1rem; margin-top: 5px;">${data.follow}</p>
                </div>
            `;
            aside.classList.add('open');
        }

        function toggleAside() { document.getElementById('asidePanel').classList.remove('open'); }

        function changeStep(n) {
            toggleAside();
            if (n === 1 && currentStep === scenes.length - 1) {
                alert("Mission successfully saved and completed.");
                return;
            }
            currentStep = Math.min(scenes.length - 1, Math.max(0, currentStep + n));
            renderStep();
        }

        function checkComp(card, correct) {
            if(correct) { card.classList.add('correct'); card.classList.remove('wrong'); }
            else { card.classList.add('wrong'); setTimeout(() => card.classList.remove('wrong'), 500); }
        }

        function checkError(word, correct) {
            if(correct) { word.style.color = 'var(--correct)'; word.style.textDecoration = 'line-through'; }
            else { word.style.animation = 'shake 0.4s'; setTimeout(() => word.style.animation = '', 400); }
        }

        function handleChat(btn, isCorrect, containerId) {
            const container = document.getElementById(containerId);
            if(isCorrect) {
                Array.from(container.querySelectorAll('.mc-btn')).forEach(b => b.style.display = 'none');
                container.innerHTML += `<div class="msg you" style="display:block;">${btn.innerText}</div>`;
            } else {
                btn.classList.add('incorrect');
                setTimeout(() => btn.classList.remove('incorrect'), 400);
            }
        }

        function moveWord(chip, dzId, targetArray) {
            if(chip.classList.contains('used')) return;
            const dz = document.getElementById(dzId);
            const word = chip.innerText;
            const newChip = document.createElement('div');
            newChip.className = 'word-chip'; 
            newChip.innerText = word;
            
            if (!chip.id) chip.id = 'chip_' + Math.random().toString(36).substr(2, 9);
            newChip.dataset.sourceId = chip.id;

            newChip.onclick = function() {
                if(dz.classList.contains('success')) return;
                dz.removeChild(this);
                document.getElementById(this.dataset.sourceId).classList.remove('used');
                const idx = buildState[dzId].lastIndexOf(this.innerText);
                if(idx !== -1) buildState[dzId].splice(idx, 1);
            };
            
            dz.appendChild(newChip);
            chip.classList.add('used');
            buildState[dzId].push(word);

            if(buildState[dzId].length === targetArray.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success');
                } else {
                    dz.style.animation = 'shake 0.4s';
                    setTimeout(() => {
                        dz.style.animation = '';
                        dz.innerHTML = '';
                        buildState[dzId] = [];
                        dz.nextElementSibling.querySelectorAll('.word-chip').forEach(c => c.classList.remove('used'));
                    }, 800);
                }
            }
        }

        function toggleFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(err => {
                            console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                        });
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            } catch (error) {
                console.log("Fullscreen API is not supported in this environment.");
            }
        }

        function toggleWhiteboard() {
            const wb = document.getElementById('whiteboardPanel');
            if (wb) wb.classList.toggle('open');
        }

        window.onload = renderStep;
    </script>
</body>
</html>
